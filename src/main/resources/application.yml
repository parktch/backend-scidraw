server:
  port: 80

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_ADDRESS:10.36.105.102:3306}/${MYSQL_DATABASE:springboot_demo}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:kV8bd5Yg}
  mvc:
    view:
      suffix: .html
      prefix: /
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

mybatis:
  mapper-locations: classpath*:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

scidraw:
  storage-root: ${SCIDRAW_STORAGE_ROOT:/tmp/scidraw}
  max-upload-size-bytes: ${SCIDRAW_MAX_UPLOAD_SIZE_BYTES:10485760}
  rscript-binary: ${SCIDRAW_RSCRIPT_BINARY:Rscript}
  rscript-timeout-seconds: ${SCIDRAW_RSCRIPT_TIMEOUT_SECONDS:60}
  scripts:
    volcano: ${SCIDRAW_SCRIPT_VOLCANO:scripts/plot_volcano.R}
    heatmap: ${SCIDRAW_SCRIPT_HEATMAP:scripts/plot_heatmap.R}
    survival: ${SCIDRAW_SCRIPT_SURVIVAL:scripts/plot_survival.R}
    boxplot: ${SCIDRAW_SCRIPT_BOXPLOT:scripts/plot_boxplot.R}
    pcr: ${SCIDRAW_SCRIPT_PCR:scripts/plot_pcr.R}
